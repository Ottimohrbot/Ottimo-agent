<title>Ottimo HR</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8f7f4;--sur:#fff;--card:#f2f0ec;--bor:#e5e1d8;
  --ac:#2c5f2e;--ac2:#3d7a40;--acl:#eaf2ea;
  --gold:#c8973a;--tx:#1a1a18;--mu:#6b6860;--mu2:#a09d97;
  --ok:#2c7a4b;--wa:#b87a1a;--er:#b83c3c;
  --r:12px;--r2:8px;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.tb{background:var(--sur);border-bottom:1px solid var(--bor);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,.06)}
.logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--ac)}
.nav button{background:none;border:none;padding:7px 14px;border-radius:var(--r2);font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--mu);cursor:pointer;transition:all .2s}
.nav button.on{color:var(--ac);background:var(--acl)}
.chip{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--bor);border-radius:20px;padding:5px 12px 5px 6px;font-size:13px;font-weight:600;cursor:pointer}
.av{width:26px;height:26px;border-radius:50%;background:var(--ac);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.main{max-width:960px;margin:0 auto;padding:32px 24px}
.card{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:24px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.csm{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);padding:16px 18px;box-shadow:0 1px 6px rgba(0,0,0,.05)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.badge{display:inline-flex;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.bok{background:#e8f5ee;color:#2c7a4b;border:1px solid #b8ddc8}
.bwa{background:#fdf3e3;color:#b87a1a;border:1px solid #f0d49a}
.ber{background:#fdf0f0;color:#b83c3c;border:1px solid #f0c4c4}
.bgr{background:var(--card);color:var(--mu);border:1px solid var(--bor)}
.btn{display:inline-flex;align-items:center;gap:5px;border:none;border-radius:var(--r2);padding:10px 18px;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .18s}
.bp{background:var(--ac);color:#fff}.bp:hover{background:var(--ac2)}
.bg2{background:transparent;color:var(--mu);border:1px solid var(--bor)}.bg2:hover{background:var(--card)}
.bfull{width:100%;justify-content:center}
.blg{padding:13px 24px;font-size:14px}
.btn:disabled{opacity:.4;cursor:not-allowed}
.fl{margin-bottom:14px}
.fl label{display:block;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--bor);border-radius:var(--r2);padding:11px 13px;color:var(--tx);font-size:14px;font-family:'Nunito',sans-serif;font-weight:500;outline:none;transition:border .18s}
.inp:focus{border-color:var(--ac);background:var(--sur)}
.inp.err{border-color:var(--er)}
.inp::placeholder{color:var(--mu2)}
.hint{font-size:11px;color:var(--mu);margin-top:3px}
.etx{font-size:11px;color:var(--er);font-weight:700;margin-top:3px}
/* LOGIN */
.lw{min-height:100vh;display:flex}
.ll{width:320px;background:linear-gradient(150deg,var(--ac),#1a3d1c);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px;color:#fff;flex-shrink:0}
.ll-lg{font-family:'Playfair Display',serif;font-size:38px;margin-bottom:10px}
.ll-tg{font-size:13px;color:rgba(255,255,255,.7);text-align:center;line-height:1.6}
.lr{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 24px;overflow-y:auto}
.lbox{width:100%;max-width:400px}
.ltabs{display:flex;gap:3px;background:var(--card);border:1px solid var(--bor);border-radius:var(--r2);padding:3px;margin-bottom:20px}
.ltab{flex:1;padding:8px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:700;font-family:'Nunito',sans-serif;background:transparent;color:var(--mu);transition:all .2s}
.ltab.on{background:var(--sur);color:var(--ac)}
.dots{display:flex;gap:7px;justify-content:center;margin-bottom:20px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--bor);transition:all .3s}
.dot.on{background:var(--ac);width:22px;border-radius:4px}
.dot.dn{background:var(--ac2)}
.pbar{height:4px;background:var(--bor);border-radius:10px;overflow:hidden;margin:12px 0 5px}
.pfill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:10px;transition:width .4s}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px}
.pc{background:var(--sur);border:2px solid var(--bor);border-radius:var(--r);padding:14px 10px;cursor:pointer;text-align:center;transition:all .2s;position:relative}
.pc:hover{border-color:var(--ac2);background:var(--acl)}
.pc.sel{border-color:var(--ac);background:var(--acl)}
.pc .ck{position:absolute;top:6px;right:6px;width:18px;height:18px;background:var(--ac);border-radius:50%;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;opacity:0}
.pc.sel .ck{opacity:1}
.qcat{font-size:11px;color:var(--ac);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.qtxt{font-family:'Playfair Display',serif;font-size:19px;line-height:1.45;margin-bottom:16px}
.choices{display:flex;flex-direction:column;gap:8px}
.ch{background:var(--bg);border:1.5px solid var(--bor);border-radius:var(--r2);padding:11px 14px;cursor:pointer;font-size:13px;font-family:'Nunito',sans-serif;font-weight:600;text-align:left;width:100%;transition:all .18s;color:var(--tx)}
.ch:hover{border-color:var(--ac2);background:var(--acl)}
.ch.sel{background:var(--acl);border-color:var(--ac);color:var(--ac)}
.nc{background:var(--sur);border:1px solid var(--bor);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.nc-h{padding:16px 18px;cursor:pointer;transition:background .2s}
.nc-h:hover{background:var(--bg)}
.nc-b{padding:4px 18px 16px;border-top:1px solid var(--bor)}
.qa-it{padding:10px 0;border-bottom:1px solid var(--bor)}
.qa-it:last-child{border-bottom:none}
.qa-cat{font-size:10px;color:var(--ac);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.qa-q{font-size:13px;font-weight:600;color:var(--tx);margin-bottom:5px}
.qa-a{background:var(--acl);border-radius:6px;padding:5px 10px;font-size:12px;font-weight:700;color:var(--ac);display:inline-block}
.sv{font-family:'Playfair Display',serif;font-size:36px;line-height:1;margin-bottom:3px}
.sl{font-size:11px;color:var(--mu);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.toast{position:fixed;top:16px;right:16px;z-index:999;padding:12px 18px;border-radius:var(--r2);font-size:13px;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.tok{background:var(--ac);color:#fff}
.ter{background:var(--er);color:#fff}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .3s ease}

/* ═══════════════════════════════════════
   AI YORDAM SAHIFASI
═══════════════════════════════════════ */
.ai-page {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 60px);
  max-width: 820px;
  margin: 0 auto;
  padding: 0;
}

.ai-topbar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 24px;
  border-bottom: 1px solid var(--bor);
  background: var(--sur);
  flex-shrink: 0;
}

.ai-avatar {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--ac), var(--ac2));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}

.ai-title { font-size: 15px; font-weight: 700; color: var(--tx); }
.ai-subtitle { font-size: 12px; color: var(--mu); margin-top: 1px; }

.ai-status {
  margin-left: auto;
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700;
  color: var(--ok);
  background: #e8f5ee;
  border: 1px solid #b8ddc8;
  border-radius: 20px;
  padding: 4px 10px;
}
.ai-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ok);
  animation: aipulse 2s infinite;
}
@keyframes aipulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.ai-lang-btns {
  display: flex; gap: 4px; margin-left: 10px;
}
.ai-lang-btn {
  background: var(--card); border: 1px solid var(--bor);
  border-radius: 6px; padding: 4px 8px; font-size: 11px;
  font-weight: 700; cursor: pointer; font-family: 'Nunito', sans-serif;
  color: var(--mu); transition: all .15s;
}
.ai-lang-btn.on { background: var(--acl); border-color: var(--ac); color: var(--ac); }

.ai-chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  background: var(--bg);
}
.ai-chat::-webkit-scrollbar { width: 4px; }
.ai-chat::-webkit-scrollbar-thumb { background: var(--bor); border-radius: 4px; }

/* Welcome screen */
.ai-welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; text-align: center; padding: 32px 20px;
  gap: 16px;
}
.ai-welcome-icon {
  width: 60px; height: 60px;
  background: linear-gradient(135deg, var(--ac), var(--ac2));
  border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px;
  box-shadow: 0 8px 24px rgba(44,95,46,.25);
  animation: aiFloat 3s ease-in-out infinite;
}
@keyframes aiFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.ai-welcome-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px; color: var(--tx); margin-bottom: 4px;
}
.ai-welcome-sub { font-size: 13px; color: var(--mu); line-height: 1.7; max-width: 340px; }

.ai-starters {
  display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
  max-width: 480px; width: 100%; margin-top: 4px;
}
.ai-starter {
  background: var(--sur); border: 1px solid var(--bor);
  border-radius: 10px; padding: 12px 14px;
  cursor: pointer; text-align: left; transition: all .18s;
}
.ai-starter:hover { border-color: var(--ac); background: var(--acl); transform: translateY(-1px); }
.ai-starter-icon { font-size: 16px; margin-bottom: 4px; }
.ai-starter-title { font-size: 12px; font-weight: 700; color: var(--tx); margin-bottom: 2px; }
.ai-starter-sub { font-size: 11px; color: var(--mu); }

/* Messages */
.ai-msg-row {
  display: flex; gap: 10px; align-items: flex-start;
  animation: aiMsgIn .25s ease;
}
@keyframes aiMsgIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.ai-msg-row.user { flex-direction: row-reverse; }

.ai-msg-av {
  width: 28px; height: 28px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0; margin-top: 2px;
}
.ai-msg-row.ai .ai-msg-av {
  background: linear-gradient(135deg, var(--ac), var(--ac2)); color: #fff;
}
.ai-msg-row.user .ai-msg-av {
  background: var(--card); border: 1px solid var(--bor); color: var(--mu);
}

.ai-bubble {
  max-width: 72%; font-size: 13.5px; line-height: 1.7;
}
.ai-msg-row.user .ai-bubble {
  background: var(--acl); border: 1px solid #c8e6c9;
  border-radius: 12px 12px 3px 12px;
  padding: 9px 13px; color: var(--tx);
}
.ai-msg-row.ai .ai-bubble {
  background: var(--sur); border: 1px solid var(--bor);
  border-radius: 3px 12px 12px 12px;
  padding: 9px 13px; color: var(--tx);
  box-shadow: 0 1px 4px rgba(0,0,0,.05);
}

.ai-typing {
  display: flex; gap: 5px; padding: 10px 13px;
  background: var(--sur); border: 1px solid var(--bor);
  border-radius: 3px 12px 12px 12px;
  width: fit-content; box-shadow: 0 1px 4px rgba(0,0,0,.05);
}
.ai-typing span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--ac2); animation: aiTyping 1.2s infinite; opacity: .4;
}
.ai-typing span:nth-child(2){animation-delay:.2s}
.ai-typing span:nth-child(3){animation-delay:.4s}
@keyframes aiTyping { 0%,100%{opacity:.3;transform:scale(.9)} 50%{opacity:1;transform:scale(1.1)} }

/* Input */
.ai-input-area {
  padding: 14px 24px 18px;
  border-top: 1px solid var(--bor);
  background: var(--sur);
  flex-shrink: 0;
}
.ai-input-box {
  display: flex; gap: 8px; align-items: flex-end;
  background: var(--bg); border: 1.5px solid var(--bor);
  border-radius: 12px; padding: 8px 8px 8px 14px;
  transition: border-color .18s;
}
.ai-input-box:focus-within { border-color: var(--ac); background: var(--sur); }
.ai-textarea {
  flex: 1; border: none; background: transparent; outline: none;
  font-family: 'Nunito', sans-serif; font-size: 13.5px;
  color: var(--tx); line-height: 1.5; resize: none;
  min-height: 22px; max-height: 120px; padding: 2px 0;
}
.ai-textarea::placeholder { color: var(--mu2); }
.ai-send {
  width: 34px; height: 34px; border-radius: 8px;
  background: var(--ac); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff; flex-shrink: 0; transition: all .15s;
}
.ai-send:hover { background: var(--ac2); transform: scale(1.05); }
.ai-send:disabled { background: var(--bor); cursor: not-allowed; transform: none; }
.ai-send svg { width: 16px; height: 16px; }

.ai-hint {
  font-size: 11px; color: var(--mu2); text-align: center; margin-top: 8px;
}
.ai-hint kbd {
  background: var(--card); border: 1px solid var(--bor);
  border-radius: 3px; padding: 1px 5px; font-family: monospace; font-size: 10px;
}

/* API key notice */
.api-notice {
  background: #fdf3e3; border: 1px solid #f0d49a; border-radius: var(--r2);
  padding: 10px 14px; font-size: 12px; color: #7a5010; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.api-key-row {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.api-key-input {
  flex: 1; background: var(--bg); border: 1.5px solid var(--bor);
  border-radius: var(--r2); padding: 8px 12px; font-size: 13px;
  font-family: 'Nunito', sans-serif; outline: none; color: var(--tx);
  transition: border .15s;
}
.api-key-input:focus { border-color: var(--ac); }
.api-key-btn {
  background: var(--ac); border: none; border-radius: var(--r2);
  color: #fff; padding: 8px 14px; font-size: 12px; font-weight: 700;
  font-family: 'Nunito', sans-serif; cursor: pointer; white-space: nowrap;
  transition: background .15s;
}
.api-key-btn:hover { background: var(--ac2); }

@media(max-width:640px){
  .ll{display:none}.lr{padding:20px 14px}
  .g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}
  .tb{padding:0 14px}.main{padding:20px 14px}
  .ai-starters{grid-template-columns:1fr}
  .ai-page{padding:0}
  .ai-chat{padding:14px}
  .ai-input-area{padding:10px 14px 14px}
}
</style>

let aiLang = 'uz';

let aiLoading = false;
let geminiKey = localStorage.getItem('ottimo_gemini_key') || '';

async function callGemini(userText) {
  const langCfg = AI_LANGS[aiLang];
  const historyPart = aiHistory.slice(-6).map(h =>
    `Foydalanuvchi: ${h.user}\nAgent: ${h.agent}`
  ).join('\n\n');

  const prompt = langCfg.system +
    (historyPart ? '\n\nOldingi suhbat:\n' + historyPart : '') +
    `\n\nFoydalanuvchi: ${userText}\nAgent:`;

  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${geminiKey}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { temperature: 0.7, maxOutputTokens: 800 }
    })
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || 'Javob kelmadi.';
}

window.aiSend = async function() {
  const inp = document.getElementById('aiInput');
  const text = (inp?.value||'').trim();
  if(!text||aiLoading) return;
  if(!geminiKey) { alert("Iltimos, avval Gemini API kalitini kiriting!"); return; }

  inp.value=''; inp.style.height='auto';
  aiLoading=true;
  document.getElementById('aiSendBtn').disabled=true;

  // Append user message & typing
  const chat=document.getElementById('aiChat');
  const ws=chat.querySelector('.ai-welcome');
  if(ws) ws.remove();

  const uRow=document.createElement('div');
  uRow.className='ai-msg-row user';
  uRow.innerHTML=`<div class="ai-msg-av">Siz</div><div class="ai-bubble">${ex(text)}</div>`;
  chat.appendChild(uRow);

  const typingRow=document.createElement('div');
  typingRow.id='aiTyping';
  typingRow.className='ai-msg-row ai';
  typingRow.innerHTML=`<div class="ai-msg-av">AI</div>
    <div class="ai-typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(typingRow);
  chat.scrollTop=99999;

  try {
    const reply=await callGemini(text);
    typingRow.remove();
    aiHistory.push({user:text,agent:reply});

    const aiRow=document.createElement('div');
    aiRow.className='ai-msg-row ai';
    aiRow.innerHTML=`<div class="ai-msg-av">AI</div><div class="ai-bubble">${formatAiText(reply)}</div>`;
    chat.appendChild(aiRow);
    chat.scrollTop=99999;
  } catch(err) {
    typingRow.remove();
    const errRow=document.createElement('div');
    errRow.className='ai-msg-row ai';
    errRow.innerHTML=`<div class="ai-msg-av">AI</div>
      <div class="ai-bubble" style="color:var(--er)">⚠️ Xato: ${ex(err.message)}. API kalitni tekshiring.</div>`;
    chat.appendChild(errRow);
    chat.scrollTop=99999;
  }

  aiLoading=false;
  document.getElementById('aiSendBtn').disabled=false;
  inp?.focus();
};

// ═══════════════════ HR HELPERS ═══════════════════
function ve(e){return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test((e||'').trim())}
function vp(p){return /^\+?[0-9]{9,13}$/.test((p||'').replace(/[\s\-\(\)]/g,''))}
function ex(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function sb(s){
  if(s>=85)return '<span class="badge bok">✓ Qabul</span>';
  if(s>=65)return '<span class="badge bwa">◎ Monitoring</span>';
  return '<span class="badge ber">✗ Rad</span>';
}
function calcScore(ans,qs){
  var t=0,c=0;
  for(var i=0;i<qs.length;i++){
    var idx=parseInt(ans[qs[i].id]);
    if(!isNaN(idx)&&idx>=0){t+=((qs[i].o.length-idx)/qs[i].o.length)*100;c++;}
  }
  return c?Math.round(t/c):50;
}

    +'<div style="font-size:11px;color:var(--mu);margin-top:2px">📞 '+(e.ph||'—')+' · 📧 '+(e.em||'—')+'</div>'

window.NEXT2=function(){
  if(!S.pos){S.errs={pos:true};R();return;}
  S.errs={};S.step=3;S.ans={};S.qi=0;R();
};

window.PREV=function(){if(S.qi>0){S.qi--;R();}};

window.NEXQ=function(){
  var qs=POS[S.pos].q;
  if(S.qi>=qs.length-1){
    S.step=4;R();
    SUBMIT();
  } else {
    S.qi++;R();
  }
};

window.SUBMIT=async function(){
  var qs=POS[S.pos].q;
  var sc=calcScore(S.ans,qs);
  var data={
    nm:S.nm,em:S.em,ph:S.ph,bd:S.bd,ad:S.ad,
    position:S.pos,answers:S.ans,sc:sc,
    date:new Date().toLocaleDateString('uz-UZ'),
    ts:Date.now(),
  };
  try{
    await addDoc(collection(db,'exams'),data);
    var pos=POS[S.pos];
    var msg='<b>🆕 Yangi imtihon natijasi</b>\n\n'
      +'👤 <b>Ism:</b> '+S.nm+'\n'
      +'💼 <b>Kasb:</b> '+(pos?pos.l:S.pos)+'\n'
      +'📧 <b>Email:</b> '+S.em+'\n'
      +'📞 <b>Telefon:</b> '+S.ph+'\n'
      +'📊 <b>Ball:</b> '+sc+'%\n'
      +'✅ <b>Holat:</b> '+(sc>=85?'Qabul':sc>=65?'Monitoring':'Rad');
    await tg(msg);
    S.result=data;R();
  }catch(err){
    S.result={sc:sc};R();
  }
};

async function loadEx(){
  try{
    var snap=await getDocs(query(collection(db,'exams'),orderBy('ts','desc')));
    S.exams=snap.docs.map(function(d){var x=d.data();x.id=d.id;return x;});
  }catch(e){console.warn(e);}
}

R();
</script>
